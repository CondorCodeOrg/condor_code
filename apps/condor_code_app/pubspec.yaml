name: condor_code
description: "CodorCode codebase"
resolution: workspace

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0 <4.0.0"

publish_to: "none"

version: 1.0.0+1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # localization
  intl: ^0.20.2

  # core
  rxdart: ^0.28.0

  # di
  get_it: ^9.2.1

  # ui
  photo_view: ^0.15.0
  youtube_player_flutter: ^9.1.3
  url_launcher: ^6.3.0
  flutter_bloc: ^8.1.6
  go_router: ^16.1.0

  cupertino_icons: ^1.0.6
  fluttertoast: ^8.2.6
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.1
  audioplayers: ^6.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.2.0
  graphview: ^1.5.1
  redacted: ^1.0.13

  # utils
  freezed_annotation: 3.1.0
  equatable: ^2.0.7

  # Firebase
  firebase_core: ^4.1.1
  firebase_analytics: ^12.4.2

  data:
    path: ../../packages/data

  domain:
    path: ../../packages/domain

  ui_kit:
    path: ../../packages/ui_kit
  youtube_player_iframe: ^5.2.2
  pointer_interceptor: ^0.10.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.14
  freezed: ^3.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

l10n:
  arb-dir: lib/ui/l10n
  template-arb-file: app_en.arb
  output-localization-file: app_localizations.dart

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: assets/images/condor_app_icon_square.png
  adaptive_icon_background: "#1D1E22"
  adaptive_icon_foreground: assets/images/condor_app_icon_square.png
  adaptive_icon_monochrome: assets/images/condor_app_icon_square.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1D1E22"
  image: assets/images/condor_app_icon_square.png
  android: true
  ios: true
  web: false
  color_dark: "#1D1E22"
  android_12:
    image: assets/images/condor_app_icon_splash_android12.png
    icon_background_color: "#1D1E22"
